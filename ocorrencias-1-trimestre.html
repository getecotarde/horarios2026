<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cards de Ocorrências - E.M. Geraldo Teixeira da Costa</title>
<style>
  :root{
    --azul: #1e3a5f;
    --azul-claro: #eaf1f8;
    --cinza: #555;
    --borda: #c7d3de;
    --vermelho: #b23a2e;
  }
  *{box-sizing:border-box;}
  body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0; padding:0;
    background:#e9edf1;
    color:#222;
  }

  /* ---------- BARRA DE CONTROLES (nao imprime) ---------- */
  #toolbar{
    position: sticky; top:0; z-index:10;
    background:#fff;
    border-bottom:2px solid var(--azul);
    padding:14px 20px;
    display:flex; flex-wrap:wrap; gap:14px; align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
  }
  #toolbar h1{
    font-size:16px; margin:0; color:var(--azul); flex-basis:100%;
  }
  #toolbar label{ font-size:13px; color:var(--cinza); font-weight:bold; margin-right:4px;}
  #toolbar select, #toolbar input[type=text]{
    padding:7px 10px; border:1px solid var(--borda); border-radius:6px; font-size:14px;
  }
  #toolbar button{
    background:var(--azul); color:#fff; border:none; border-radius:6px;
    padding:9px 18px; font-size:14px; cursor:pointer; font-weight:bold;
  }
  #toolbar button:hover{ background:#16293f; }
  #toolbar .aviso-tinta{
    flex-basis:100%; font-size:11.5px; color:var(--cinza);
  }
  #toolbar button.secundario{ background:#fff; color:var(--azul); border:1px solid var(--azul);}
  #toolbar button.secundario:hover{ background:var(--azul-claro); }
  #contador{ font-size:13px; color:var(--cinza); margin-left:auto; }

  .campo{ display:flex; align-items:center; gap:6px; }

  /* ---------- AREA DE VISUALIZACAO ---------- */
  #folhas{
    padding:24px;
    display:flex; flex-direction:column; align-items:center; gap:24px;
  }

  .folha{
    background:#fff;
    width:297mm; height:210mm;
    padding:8mm;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap:6mm;
  }

  /* Tamanhos de fonte FIXOS em todos os cards — não variam conforme a
     quantidade de ocorrências do aluno (isso evitava dar a falsa impressão
     de que "menos ocorrências = mais grave" por causa de uma fonte maior).
     Apenas o espaçamento vertical das linhas da tabela (--rowpad) se ajusta
     via JS quando há muitos tipos de ocorrência, para caber no card. */
  .card{
    border:1.3px solid var(--azul);
    border-radius:6px;
    padding:3.5mm 4mm;
    display:flex; flex-direction:column;
    overflow:hidden;
    position:relative;
    --rowpad: 2.6px;
  }

  .card-header{
    border-bottom:1.2px solid var(--azul);
    padding-bottom:1.5px; margin-bottom:2px;
  }
  .escola{
    font-size:10.5px; font-weight:bold; color:var(--azul); letter-spacing:.2px;
    text-transform:uppercase; line-height:1.25;
  }
  .periodo{
    font-size:9.5px; color:var(--cinza); font-style:italic; line-height:1.2;
  }
  .aluno-linha{
    display:flex; justify-content:space-between; align-items:baseline; margin-top:1.5px;
    gap:6px;
  }
  .aluno-nome{
    /* nome sempre grande e com o mesmo tamanho em todos os cards */
    font-size:16px; font-weight:bold; color:#111;
    line-height:1.15;
  }
  .turma-tag{
    font-size:11px; font-weight:bold; color:var(--azul); background:#fff;
    border:1.2px solid var(--azul);
    padding:1px 7px; border-radius:10px; white-space:nowrap;
  }

  .resumo{
    display:flex; align-items:center; gap:7px; margin:2px 0 2.5px 0;
  }
  .total-badge{
    background:#fff; color:var(--vermelho); font-weight:bold;
    border:1.3px solid var(--vermelho);
    font-size:13px; border-radius:5px; padding:1px 8px;
  }
  .total-label{ font-size:9.5px; color:var(--cinza); }

  table.tipos{
    width:100%; border-collapse:collapse; flex:1; table-layout:fixed;
  }
  table.tipos thead th{
    text-align:left; font-size:10.5px; color:var(--azul); background:#fff;
    border-bottom:1.4px solid var(--azul);
    padding:2px 5px; font-weight:bold;
  }
  table.tipos thead th.qtd-col{ text-align:center; width:11mm; }
  table.tipos tbody td{
    /* tamanho equivalente a, no mínimo, fonte 12 (Arial) = 16px */
    font-size:16px; line-height:1.12;
    padding:var(--rowpad) 5px; border-bottom:0.6px solid #d7dfe7; vertical-align:top;
  }
  table.tipos tbody td.qtd-col{ text-align:center; font-weight:bold; color:var(--vermelho); }
  table.tipos tbody tr.linha-resumo td{
    font-style:italic; color:var(--cinza); font-size:14px;
  }

  .rodape-card{
    margin-top:2px; padding-top:1.5px; border-top:1px dashed var(--borda);
    font-size:8.5px; color:#8a97a3; display:flex; justify-content:space-between;
  }

  .card-vazio{ border:none; }

  /* ---------- IMPRESSAO ---------- */
  @media print{
    body{ background:#fff; }
    #toolbar{ display:none !important; }
    #folhas{ padding:0; gap:0; }
    .folha{
      box-shadow:none;
      margin:0;
      page-break-after: always;
    }
    .folha:last-child{ page-break-after: auto; }
    @page{ size:A4 landscape; margin:0; }
  }

  #vazio-msg{
    text-align:center; color:var(--cinza); padding:60px 20px; font-size:15px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <h1>Cards de Ocorrências — E.M. Geraldo Teixeira da Costa · 1º Trimestre 2026</h1>

  <div class="campo">
    <label for="turmaSel">Turma:</label>
    <select id="turmaSel"></select>
  </div>

  <div class="campo">
    <label for="buscaAluno">Buscar aluno:</label>
    <input type="text" id="buscaAluno" placeholder="Nome do aluno...">
  </div>

  <div class="campo">
    <label for="ordenar">Ordenar por:</label>
    <select id="ordenar">
      <option value="nome">Nome (A-Z)</option>
      <option value="total_desc">Nº de registros (maior p/ menor)</option>
      <option value="total_asc">Nº de registros (menor p/ maior)</option>
    </select>
  </div>

  <div class="campo">
    <label for="minOcorr">Mín. de registros:</label>
    <input type="text" id="minOcorr" value="1" style="width:50px">
  </div>

  <button class="secundario" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  <span id="contador"></span>
  <span class="aviso-tinta">Layout otimizado para economia de tinta: sem fundos escuros, apenas contornos e texto colorido.</span>
</div>

<div id="folhas"></div>
<div id="vazio-msg" style="display:none">Nenhum aluno encontrado com os filtros atuais.</div>

const turmaSel = document.getElementById('turmaSel');
const buscaAluno = document.getElementById('buscaAluno');
const ordenarSel = document.getElementById('ordenar');
const minOcorr = document.getElementById('minOcorr');
const folhasEl = document.getElementById('folhas');
const contadorEl = document.getElementById('contador');
const vazioMsg = document.getElementById('vazio-msg');

const turmas = Object.keys(DATA);
let opt = document.createElement('option');
opt.value = '__TODAS__';
opt.textContent = 'Todas as turmas';
turmaSel.appendChild(opt);
turmas.forEach(t=>{
  let o = document.createElement('option');
  o.value = t; o.textContent = t;
  turmaSel.appendChild(o);
});

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function coletarAlunos(){
  const turmaAtual = turmaSel.value;
  const termo = buscaAluno.value.trim().toUpperCase();
  const min = parseInt(minOcorr.value) || 0;
  let lista = [];
  const turmasParaPercorrer = turmaAtual === '__TODAS__' ? turmas : [turmaAtual];
  turmasParaPercorrer.forEach(t=>{
    const alunos = DATA[t];
    Object.keys(alunos).forEach(nome=>{
      const info = alunos[nome];
      if (info.total < min) return;
      if (termo && !nome.toUpperCase().includes(termo)) return;
      lista.push({ turma:t, nome, ...info });
    });
  });

  const modo = ordenarSel.value;
  if (modo === 'nome'){
    lista.sort((a,b)=> a.nome.localeCompare(b.nome,'pt-BR'));
  } else if (modo === 'total_desc'){
    lista.sort((a,b)=> b.total - a.total || a.nome.localeCompare(b.nome,'pt-BR'));
  } else if (modo === 'total_asc'){
    lista.sort((a,b)=> a.total - b.total || a.nome.localeCompare(b.nome,'pt-BR'));
  }
  return lista;
}

function montarCardHTML(item){
  const linhasTipos = item.tipos.map(t=>
    `<tr data-qtd="${t.qtd}"><td>${escapeHtml(t.tipo)}</td><td class="qtd-col">${t.qtd}</td></tr>`
  ).join('');
  return `
  <div class="card">
    <div class="card-header">
      <div class="escola">E.M. Geraldo Teixeira da Costa</div>
      <div class="periodo">1º Trimestre 2026</div>
      <div class="aluno-linha">
        <div class="aluno-nome">${escapeHtml(item.nome)}</div>
        <div class="turma-tag">${escapeHtml(item.turma)}</div>
      </div>
    </div>
    <div class="resumo">
      <span class="total-badge">${item.total}</span>
      <span class="total-label">registro(s) de ocorrência no trimestre</span>
    </div>
    <table class="tipos">
      <thead><tr><th>Tipo de ocorrência</th><th class="qtd-col">Qtd.</th></tr></thead>
      <tbody data-original="${escapeHtml(JSON.stringify(item.tipos))}">${linhasTipos}</tbody>
    </table>
    <div class="rodape-card">
      <span>Registro de Ocorrências Escolares</span>
      <span>1º Trim. 2026</span>
    </div>
  </div>`;
}

function cardTransborda(card){
  return card.scrollHeight > card.clientHeight + 0.5 || card.scrollWidth > card.clientWidth + 0.5;
}

// A fonte NUNCA muda de tamanho (nome do aluno e lista de tipos ficam sempre
// no mesmo tamanho em todos os cards, independente da quantidade de
// ocorrências). O que se ajusta, quando necessário, é apenas o espaçamento
// vertical entre as linhas da tabela (--rowpad), e só em último caso — se
// mesmo no espaçamento mínimo não couber — resume as ocorrências menos
// frequentes em uma única linha "+N outros tipos".
const ROWPAD_MAX = 2.6, ROWPAD_MIN = 0.5, ROWPAD_STEP = 0.2;

function ajustarEspacamento(card){
  let pad = ROWPAD_MAX;
  card.style.setProperty('--rowpad', pad + 'px');
  while (pad > ROWPAD_MIN && cardTransborda(card)){
    pad = Math.max(ROWPAD_MIN, pad - ROWPAD_STEP);
    card.style.setProperty('--rowpad', pad + 'px');
  }
  return !cardTransborda(card);
}

function resumirExcedentes(card){
  const tbody = card.querySelector('tbody');
  let tipos;
  try { tipos = JSON.parse(tbody.dataset.original); } catch(e){ return; }
  // remove uma linha (a de menor quantidade) por vez e substitui por um
  // resumo, ate caber com o espacamento minimo
  card.style.setProperty('--rowpad', ROWPAD_MIN + 'px');
  let visiveis = tipos.length;
  while (visiveis > 1 && cardTransborda(card)){
    visiveis -= 1;
    const mostrados = tipos.slice(0, visiveis);
    const ocultos = tipos.slice(visiveis);
    const qtdOcultos = ocultos.reduce((s,t)=> s + t.qtd, 0);
    let html = mostrados.map(t=>
      `<tr data-qtd="${t.qtd}"><td>${escapeHtml(t.tipo)}</td><td class="qtd-col">${t.qtd}</td></tr>`
    ).join('');
    html += `<tr class="linha-resumo"><td>+ ${ocultos.length} outro(s) tipo(s)</td><td class="qtd-col">${qtdOcultos}</td></tr>`;
    tbody.innerHTML = html;
  }
}

function ajustarCard(card){
  const coube = ajustarEspacamento(card);
  if (!coube){
    resumirExcedentes(card);
  }
}

function ajustarTodosOsCards(){
  document.querySelectorAll('.card:not(.card-vazio)').forEach(ajustarCard);
}

function renderizar(){
  const lista = coletarAlunos();
  folhasEl.innerHTML = '';
  contadorEl.textContent = lista.length + ' aluno(s) · ' + Math.ceil(lista.length/4) + ' folha(s) A4';

  if (lista.length === 0){
    vazioMsg.style.display = 'block';
    return;
  }
  vazioMsg.style.display = 'none';

  for (let i=0; i<lista.length; i+=4){
    const grupo = lista.slice(i, i+4);
    const folha = document.createElement('div');
    folha.className = 'folha';
    let html = '';
    grupo.forEach(item=> html += montarCardHTML(item));
    for (let j=grupo.length; j<4; j++){
      html += '<div class="card card-vazio"></div>';
    }
    folha.innerHTML = html;
    folhasEl.appendChild(folha);
  }
  // aguarda o layout ser aplicado antes de medir os cards
  requestAnimationFrame(()=> requestAnimationFrame(ajustarTodosOsCards));
}

window.addEventListener('beforeprint', ajustarTodosOsCards);
window.addEventListener('resize', ()=> clearTimeout(window._rzTimer) || (window._rzTimer = setTimeout(ajustarTodosOsCards, 200)));


[turmaSel, buscaAluno, ordenarSel, minOcorr].forEach(el=>{
  el.addEventListener('input', renderizar);
  el.addEventListener('change', renderizar);
});

renderizar();
</script>
